[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["ffmpeg", "python311", "python311Packages.pip"]

[build.nixpacksPlan.phases.install]
cmds = ["cd backend && python3.11 -m pip install -r requirements.txt"]

[deploy]
startCommand = "cd backend && python3.11 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
